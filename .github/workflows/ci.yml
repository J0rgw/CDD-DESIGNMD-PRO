name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Validate examples against upstream design.md spec
        run: |
          if [ -d "examples" ] && [ "$(ls -A examples 2>/dev/null)" ]; then
            for f in examples/**/*.md examples/*.md; do
              [ -f "$f" ] || continue
              echo "Validating $f"
              bunx @google/design.md spec < "$f" || exit 1
            done
          else
            echo "No examples to validate yet (skip)"
          fi
