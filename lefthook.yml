# lefthook configuration — hooks NOT installed yet (planned for session 2).
# To activate locally, run: bunx lefthook install

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: bunx biome check --write {staged_files} && git add {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: bunx tsc --noEmit

commit-msg:
  commands:
    conventional:
      run: |
        head -1 "{1}" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\(.+\))?!?: .+' \
          || { echo "Commit message must follow Conventional Commits."; exit 1; }

pre-push:
  commands:
    test:
      run: bun run test
